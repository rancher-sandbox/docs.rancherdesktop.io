name: Test deployment

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test-deploy:
    name: Test deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Internal links must be relative
        run: |
          # Internal links must use relative paths (../foo/bar.md) so the build
          # validates them. An absolute https://docs.rancherdesktop.io/<path> link
          # to a page added in the same PR would 404 in the link check until that
          # page is deployed, so forbid absolute self-links in content.
          bad=$(grep -rnE 'https://docs\.rancherdesktop\.io/[^ )"]' docs --include='*.md' || true)
          if [ -n "$bad" ]; then
            echo "$bad"
            echo "::error::Internal links must be relative (e.g. ../getting-started/installation.md), not absolute https://docs.rancherdesktop.io/... URLs."
            exit 1
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: yarn
      - name: Check links
        run: |
          set -e
          LYCHEE_TARGZ=lychee-x86_64-unknown-linux-gnu.tar.gz
          LYCHEE_VERSION=0.23.0
          LYCHEE_SHA256=1fcb6ccf10d04c22b8c5873c5b9cb7be32ee7423e12169d6f1a79a6f1962ef81
          curl -sfLO https://github.com/lycheeverse/lychee/releases/download/lychee-v${LYCHEE_VERSION}/${LYCHEE_TARGZ}
          echo "${LYCHEE_SHA256}  ${LYCHEE_TARGZ}" | sha256sum -c - 
          tar xfvz ${LYCHEE_TARGZ} lychee
          # Re-run the whole check on failure: lychee does not retry
          # connection-setup errors (DNS/TLS), so one flaky external host
          # can fail an otherwise-good run.
          for attempt in 1 2 3; do
            if ./lychee "docs/**/*.md" "versioned_docs/**/*.md"; then
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              echo "Link check attempt ${attempt} failed; retrying after backoff"
              sleep $((attempt * 10))
            fi
          done
          exit 1
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Typecheck
        run: yarn typecheck
      - name: Test build
        run: yarn build
