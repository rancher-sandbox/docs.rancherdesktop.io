name: Test deployment

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test-deploy:
    name: Test deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Internal links must be relative
        run: |
          # Internal links must use relative paths (../foo/bar.md) so the build
          # validates them. lychee no longer checks absolute
          # https://docs.rancherdesktop.io/<path> links, so forbid them in content
          # to keep internal-link typos covered. The per-page canonical <link>
          # tag is the only allowed exception.
          bad=$(grep -rnE 'https://docs\.rancherdesktop\.io/[^ )"]' docs --include='*.md' | grep -v 'rel="canonical"' || true)
          if [ -n "$bad" ]; then
            echo "$bad"
            echo "::error::Internal links must be relative (e.g. ../getting-started/installation.md), not absolute https://docs.rancherdesktop.io/... URLs."
            exit 1
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: yarn
      - name: Check links
        run: |
          set -e
          LYCHEE_TARGZ=lychee-x86_64-unknown-linux-gnu.tar.gz
          LYCHEE_VERSION=0.23.0
          LYCHEE_SHA256=1fcb6ccf10d04c22b8c5873c5b9cb7be32ee7423e12169d6f1a79a6f1962ef81
          curl -sfLO https://github.com/lycheeverse/lychee/releases/download/lychee-v${LYCHEE_VERSION}/${LYCHEE_TARGZ}
          echo "${LYCHEE_SHA256}  ${LYCHEE_TARGZ}" | sha256sum -c - 
          tar xfvz ${LYCHEE_TARGZ} lychee
          # Re-run the whole check on failure: lychee does not retry
          # connection-setup errors (DNS/TLS), so one flaky external host
          # can fail an otherwise-good run.
          for attempt in 1 2 3; do
            if ./lychee "docs/**/*.md" "versioned_docs/**/*.md"; then
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              echo "Link check attempt ${attempt} failed; retrying after backoff"
              sleep $((attempt * 10))
            fi
          done
          exit 1
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Test build
        run: yarn build
