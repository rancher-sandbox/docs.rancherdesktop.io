# Avoid running out of file handles on macOS
max_concurrency = 64

# Treat 429 as a valid link: it means the host rate-limited the checker,
# not that the page is missing (a removed page returns 404). The range
# keeps lychee's default accepted codes (100..=103 and 200..=299).
accept = ["100..=103", "200..=299", "429"]

exclude_loopback = true

exclude = [
    # Websites using "bot protection" and returning 403 errors
    "^https://openai.com/",
    "^https://openwebui.com/",
    "^https://stackoverflow.com/",
    # helm.sh resets the checker's connections from CI ("connection reset by peer")
    "^https://helm.sh/",
    # Skip the AppImage download check; sometimes mirrors fall over.
    "^https://download.opensuse.org/repositories/isv:/Rancher:/stable/AppImage/rancher-desktop-latest-x86_64.AppImage",
    # URLs for development examples, not actual web pages
    "^http://demo.local(dev|test).me",
    # URLs for proxy rules, not actual web pages
    "^https://desktop.version.rancher.io/v1/checkupgrade",
    "^https://github.com/k3s-io/k3s/releases/download",
    "^https://storage.googleapis.com/kubernetes-release/release",
    # Repo has been deleted, needs to be fixed: https://github.com/rancher-sandbox/docs.rancherdesktop.io/issues/442
    "^https://github.com/bwateratmsft/samples",
]
